<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="512" height="512">
  <defs>
    <linearGradient id="dropGrad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#2a9bc0"/>
      <stop offset="1" stop-color="#0d6f8d"/>
    </linearGradient>
  </defs>

  <!-- Fond carré arrondi sombre -->
  <rect x="24" y="24" width="464" height="464" rx="96" fill="#262626"/>

  <!-- Arc cyan (jauge ouverte vers le bas) -->
  <path d="M 145 350
           A 158 158 0 1 1 367 350"
        fill="none" stroke="#1fc3e0" stroke-width="15" stroke-linecap="round"/>

  <!-- Point au sommet de l'arc -->
  <circle cx="256" cy="100" r="11" fill="#1fc3e0"/>

  <!-- Goutte d'eau -->
  <path d="M 256 150
           C 256 210 340 252 340 320
           A 84 84 0 1 1 172 320
           C 172 252 256 210 256 150 Z"
        fill="url(#dropGrad)"/>
</svg>
